{% extends "menu.html" %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='quotation.css') }}">
{% endblock %}

{% block content %}
<div class="quotation-page" id="rbac" data-role="{{ (role or 'user')|lower }}">

  <div class="quotation-header">
    <div>
      <h2 class="quotation-title">Quotation</h2>
    </div>

    <div class="quotation-header-right">
      <button class="btn-primary" id="addQuotationBtn">+ Add New Quotation</button>
    </div>
  </div>

  <div class="quotation-filters">
    <div class="search-wrap">
      <input type="text" id="searchInput" class="mini-search"
             placeholder="Search by Quotation ID / Customer Name..." />
      <button class="clear-filter" id="clearFilterBtn">Clear Filter</button>
    </div>

    <div class="filter-row">
      <div class="filter-item">
        <label>Status</label>
        <select id="statusFilter">
          <option value="">All</option>
          <option value="draft">Draft</option>
          <option value="send">Send</option>
          <option value="approved">Approved</option>
          <option value="rejected">Rejected</option>
          <option value="expired">Expired</option>
        </select>
      </div>

      <div class="filter-item">
        <label>Quotation Type</label>
        <select id="typeFilter">
          <option value="">All</option>
          <option value="standard">Standard</option>
          <option value="blanket">Blanket</option>
          <option value="service">Service</option>
        </select>
      </div>

      <div class="filter-item">
        <label>Sales Rep</label>
        <select id="salesRepFilter">
          <option value="">All</option>
        </select>
      </div>
    </div>
  </div>

  <div class="table-wrapper">
    <table class="quotation-table">
      <thead>
        <tr>
          <th>Quotation ID</th>
          <th>Quotation Type</th>
          <th>Customer Name</th>
          <th>Sales Rep</th>
          <th>Quotation Date</th>
          <th>Status</th>
          <th class="right">Grand Total</th>
          <th class="center">Action</th>
        </tr>
      </thead>

      <tbody id="quotationTableBody">
        <tr id="noDataRow">
          <td colspan="8" class="no-data">No quotations found</td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="pager-bar">
    <div class="pager-left" id="showingCount">Showing 0 entries</div>
    <div class="pager-right">
      <button class="pager-btn" id="prevBtn">Prev</button>
      <span class="pager-text">Page <b id="pageNow">1</b> of <b id="pageTotal">1</b></span>
      <button class="pager-btn" id="nextBtn">Next</button>
    </div>
  </div>

</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='quotation.js') }}"></script>
{% endblock %}
